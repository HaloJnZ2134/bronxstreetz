name: Update Roblox Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Roblox stats
        run: node scripts/update-roblox-stats.mjs

      - name: Commit stats cache
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain data/roblox-stats.json)" ]]; then
            git add data/roblox-stats.json
            git commit -m "Update Roblox stats cache"
            git push
          else
            echo "No stats cache changes to commit."
          fi
